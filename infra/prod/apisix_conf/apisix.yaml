upstreams:
- id: abc-service-upstream
  nodes:
    abc-service:8080: 1
  type: roundrobin
- id: def-service-upstream
  nodes:
    def-service:8080: 1
  type: roundrobin
- id: iam-service-upstream
  nodes:
    iam-service:8080: 1
  type: roundrobin
- id: privacy-service-upstream
  nodes:
    privacy-service:8080: 1
  type: roundrobin
- id: discovery-service-upstream
  nodes:
    discovery-service:8080: 1
  type: roundrobin
- id: keycloak-upstream
  nodes:
    keycloak:8080: 1
  type: roundrobin
- id: trm-service-upstream
  nodes:
    trm-service:8080: 1
  type: roundrobin
- id: cookie-scanner-upstream
  nodes:
    cookie-scanner:8080: 1
  type: roundrobin
- id: public-api-service-upstream
  nodes:
    public-api-service:8080: 1
  type: roundrobin
- id: frontend-upstream
  nodes:
    frontend:80: 1
  type: roundrobin
routes:
- id: keycloak-route
  uris:
  - /realms/*
  - /resources/*
  - /js/*
  upstream_id: keycloak-upstream
  plugins:
    proxy-rewrite:
      headers:
        set:
          Host: api.demo.arcompli.com
          X-Real-IP: $remote_addr
          X-Forwarded-For: $remote_addr
          X-Forwarded-Proto: https
          X-Forwarded-Port: '443'
          X-Forwarded-Host: api.demo.arcompli.com
    cors:
      allow_origins: https://demo.arcompli.com
      allow_methods: GET,POST,PUT,DELETE,OPTIONS
      allow_headers: Authorization,Content-Type,X-Organization-Id
      allow_credential: true
- id: iam-users-me-route
  uri: /api/iam/users/me
  methods:
  - GET
  - OPTIONS
  priority: 20
  upstream_id: iam-service-upstream
  plugins:
    cors:
      allow_origins: https://demo.arcompli.com
      allow_methods: GET,OPTIONS
      allow_headers: Authorization,Content-Type,X-Organization-Id
      allow_credential: true
- id: iam-domain-options
  uri: /api/iam/*
  methods:
  - OPTIONS
  upstream_id: iam-service-upstream
  plugins:
    cors:
      allow_origins: https://demo.arcompli.com
      allow_methods: GET,POST,PUT,DELETE,OPTIONS
      allow_headers: Authorization,Content-Type,X-Organization-Id
      allow_credential: true
- id: abc-domain-options
  uri: /api/abc/*
  methods:
  - OPTIONS
  priority: 10
  upstream_id: abc-service-upstream
  plugins:
    cors:
      allow_origins: https://demo.arcompli.com
      allow_methods: GET,POST,PUT,DELETE,OPTIONS
      allow_headers: Authorization,Content-Type,X-Organization-Id
      allow_credential: true
    serverless-post-function:
      phase: header_filter
      functions:
      - return function(conf, ctx) local allowed = { ['https://demo.arcompli.com']=true,
        ['http://localhost:5173']=true, ['http://localhost:3000']=true }; local origin
        = ngx.var.http_origin; if origin and allowed[origin] then ngx.header['Access-Control-Allow-Origin']
        = origin; ngx.header['Access-Control-Allow-Credentials'] = 'true'; ngx.header['Access-Control-Allow-Methods']
        = 'GET,POST,PUT,DELETE,OPTIONS'; ngx.header['Access-Control-Allow-Headers']
        = 'Authorization,Content-Type,X-Organization-Id'; end; end
- id: privacy-domain-options
  uri: /api/privacy/*
  methods:
  - OPTIONS
  priority: 10
  upstream_id: privacy-service-upstream
