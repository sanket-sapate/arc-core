- id: iam-domain-read
  uri: /api/iam/*
  methods:
  - GET
  upstream_id: iam-service-upstream
  plugins:
    limit-count:
      count: 100
      time_window: 60
      rejected_code: 429
      key: http_x_organization_id
    proxy-rewrite: {}
    ext-plugin-pre-req:
      conf:
      - name: authz
        value: '{"permission_slug": "roles.read"}'
    cors:
      allow_origins: https://demo.arcompli.com
      allow_methods: GET,POST,PUT,DELETE,OPTIONS
