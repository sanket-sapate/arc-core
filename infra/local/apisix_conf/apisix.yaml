upstreams:
  - id: abc-service-upstream
    nodes:
      "abc-service:8080": 1
    type: roundrobin

  - id: def-service-upstream
    nodes:
      "def-service:8080": 1
    type: roundrobin

  - id: iam-service-upstream
    nodes:
      "iam-service:8080": 1
    type: roundrobin

  - id: privacy-service-upstream
    nodes:
      "privacy-service:8080": 1
    type: roundrobin

  - id: discovery-service-upstream
    nodes:
      "discovery-service:8080": 1
    type: roundrobin

  - id: keycloak-upstream
    nodes:
      "keycloak:8080": 1
    type: roundrobin

  - id: trm-service-upstream
    nodes:
      "trm-service:8080": 1
    type: roundrobin

  - id: cookie-scanner-upstream
    nodes:
      "cookie-scanner:8080": 1
    type: roundrobin

  - id: public-api-service-upstream
    nodes:
      "public-api-service:8080": 1
    type: roundrobin

# ── Global Rules ─────────────────────────────────────────────────────────────
# CORS headers must be present on ALL responses (including error responses from
# ext-plugin-pre-req) otherwise the browser blocks the response entirely.
global_rules:
  - id: 1
    plugins:
      cors:
        allow_origins: "https://arc.rnrtechs.com,http://arc.rnrtechs.com,http://api.arc.rnrtechs.com,http://localhost:5173"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,X-Organization-Id,Content-Type"
        allow_credential: true

routes:
  # ─── Keycloak Route ──────────────────────────────────────────────
  - id: keycloak-route
    uris:
      - "/realms/*"
      - "/resources/*"
      - "/js/*"
    upstream_id: keycloak-upstream
    plugins:
      cors:
        allow_origins: "https://arc.rnrtechs.com,http://arc.rnrtechs.com,http://api.arc.rnrtechs.com,http://localhost:5173"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,X-Organization-Id,Content-Type"
        allow_credential: true

  # ─── ABC Service Routes (method-scoped for fine-grained authz) ───
  # Fixes FLAW-1.3: the original single route used "item:read" for ALL
  # methods, meaning users with read-only permission could create/mutate/delete.
  - id: abc-domain-read
    uri: /api/abc/*
    methods: ["GET", "OPTIONS"]
    upstream_id: abc-service-upstream
    plugins:
      limit-count:
        count: 100
        time_window: 60
        rejected_code: 429
        key: "http_x_organization_id"
      cors:
        allow_origins: "https://arc.rnrtechs.com,http://arc.rnrtechs.com,http://api.arc.rnrtechs.com,http://localhost:5173"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,X-Organization-Id,Content-Type"
        allow_credential: true
      proxy-rewrite:
        headers:
          set:
            X-Internal-User-Id: ""
            X-Internal-Org-Id: ""
            X-Internal-Permissions: ""
      ext-plugin-pre-req:
        conf:
          - name: "authz"
            value: '{"permission_slug": "dictionary.read"}'

  - id: abc-domain-write
    uri: /api/abc/*
    methods: ["POST", "PATCH", "PUT"]
    upstream_id: abc-service-upstream
    plugins:
      limit-count:
        count: 100
        time_window: 60
        rejected_code: 429
        key: "http_x_organization_id"
      cors:
        allow_origins: "https://arc.rnrtechs.com,http://arc.rnrtechs.com,http://api.arc.rnrtechs.com,http://localhost:5173"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,X-Organization-Id,Content-Type"
        allow_credential: true
      proxy-rewrite:
        headers:
          set:
            X-Internal-User-Id: ""
            X-Internal-Org-Id: ""
            X-Internal-Permissions: ""
      ext-plugin-pre-req:
        conf:
          - name: "authz"
            value: '{"permission_slug": "dictionary.create"}'

  - id: abc-domain-delete
    uri: /api/abc/*
    methods: ["DELETE"]
    upstream_id: abc-service-upstream
    plugins:
      limit-count:
        count: 100
        time_window: 60
        rejected_code: 429
        key: "http_x_organization_id"
      cors:
        allow_origins: "https://arc.rnrtechs.com,http://arc.rnrtechs.com,http://api.arc.rnrtechs.com,http://localhost:5173"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,X-Organization-Id,Content-Type"
        allow_credential: true
      proxy-rewrite:
        headers:
          set:
            X-Internal-User-Id: ""
            X-Internal-Org-Id: ""
            X-Internal-Permissions: ""
      ext-plugin-pre-req:
        conf:
          - name: "authz"
            value: '{"permission_slug": "dictionary.delete"}'

  # ─── DEF Service Routes ───────────────────────────────────
  - id: def-domain-route
    uri: /api/def/*
    upstream_id: def-service-upstream
    plugins:
      limit-count:
        count: 100
        time_window: 60
        rejected_code: 429
        key: "http_x_organization_id"
      cors:
        allow_origins: "https://arc.rnrtechs.com,http://arc.rnrtechs.com,http://api.arc.rnrtechs.com,http://localhost:5173"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,X-Organization-Id,Content-Type"
        allow_credential: true
      proxy-rewrite:
        headers:
          set:
            X-Internal-User-Id: ""
            X-Internal-Org-Id: ""
            X-Internal-Permissions: ""
      ext-plugin-pre-req:
        conf:
          - name: "authz"
            value: '{"permission_slug": "audit_cycles.read"}'

  # ─── IAM /users/me Route (any authenticated user, no perm check) ──
  # This endpoint bootstraps the user's session after login. It must
  # NOT require iam:manage — every logged-in user needs access.
  - id: iam-users-me-route
    uri: /api/iam/users/me
    methods: ["GET", "OPTIONS"]
    priority: 20
    upstream_id: iam-service-upstream
    plugins:
      cors:
        allow_origins: "https://arc.rnrtechs.com,http://arc.rnrtechs.com,http://api.arc.rnrtechs.com,http://localhost:5173"
        allow_methods: "GET,OPTIONS"
        allow_headers: "Authorization,X-Organization-Id,Content-Type"
        allow_credential: true

  # ─── IAM Service Routes (admin only) ─────────────────────
  # OPTIONS preflight route — must bypass authz to allow CORS preflight
  - id: iam-domain-options
    uri: /api/iam/*
    methods: ["OPTIONS"]
    upstream_id: iam-service-upstream
    plugins:
      cors:
        allow_origins: "https://arc.rnrtechs.com,http://arc.rnrtechs.com,http://api.arc.rnrtechs.com,http://localhost:5173"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,X-Organization-Id,Content-Type"
        allow_credential: true

  # IAM read routes — any authenticated member can list roles & permissions
  - id: iam-domain-read
    uri: /api/iam/*
    methods: ["GET"]
    upstream_id: iam-service-upstream
    plugins:
      limit-count:
        count: 100
        time_window: 60
        rejected_code: 429
        key: "http_x_organization_id"
      cors:
        allow_origins: "https://arc.rnrtechs.com,http://arc.rnrtechs.com,http://api.arc.rnrtechs.com,http://localhost:5173"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,X-Organization-Id,Content-Type"
        allow_credential: true
      proxy-rewrite:
        headers:
          set:
            X-Internal-User-Id: ""
            X-Internal-Org-Id: ""
            X-Internal-Permissions: ""
      ext-plugin-pre-req:
        conf:
          - name: "authz"
            value: '{"permission_slug": "roles.read"}'

  # IAM write routes — only admins can create/edit roles and permissions
  - id: iam-domain-write
    uri: /api/iam/*
    methods: ["POST", "PUT", "PATCH", "DELETE"]
    upstream_id: iam-service-upstream
    plugins:
      limit-count:
        count: 100
        time_window: 60
        rejected_code: 429
        key: "http_x_organization_id"
      cors:
        allow_origins: "https://arc.rnrtechs.com,http://arc.rnrtechs.com,http://api.arc.rnrtechs.com,http://localhost:5173"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,X-Organization-Id,Content-Type"
        allow_credential: true
      proxy-rewrite:
        headers:
          set:
            X-Internal-User-Id: ""
            X-Internal-Org-Id: ""
            X-Internal-Permissions: ""
      ext-plugin-pre-req:
        conf:
          - name: "authz"
            value: '{"permission_slug": "roles.create"}'

  # ─── Public Swagger UI Routes (no auth) ──────────────────
  - id: abc-swagger-route
    uri: /api/abc/swagger/*
    priority: 10
    upstream_id: abc-service-upstream
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/abc/(.*)", "/$1"]
