<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Form Demo</title>
    <script src="/api/v1/sdk/cmp.js?apiKey=f8c965ecdf3499ed9fb3343a303b8f9df5ff01e4746c4dd562f86d9635cb47df"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Signup Form</h1>
    <p>This form demonstrates Field-Level Consent Binding.</p>

    <form id="signup-form" action="/static/submit-success.html" method="GET">
        <div class="form-group">
            <label>Name (No Consent Required)</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Email (Requires 'marketing_opt_in')</label>
            <input type="email" name="email" data-cmp-consent-id="marketing_opt_in">
        </div>

        <div class="form-group">
            <label>Phone (Requires 'sms_notifications')</label>
            <input type="tel" name="phone" data-cmp-consent-id="sms_notifications">
        </div>

        <button type="submit">Sign Up</button>
    </form>

    <script>
        // Initialize CMP SDK
        CMP.init({
            apiKey: 'f8c965ecdf3499ed9fb3343a303b8f9df5ff01e4746c4dd562f86d9635cb47df',
            formSelector: '#signup-form',
            portalUrl: '/static/portal.html'
        });

        // Handle the "success" redirect for demo purposes
        if (window.location.pathname === '/submit-success') {
            document.body.innerHTML = '<h2>Success! Form submitted.</h2><p>Check URL parameters for consent_receipt_id.</p>';
        }
    </script>
</body>

</html>
