<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Successful</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 text-center space-y-6">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i data-lucide="check" class="w-8 h-8 text-green-600"></i>
        </div>

        <h1 class="text-2xl font-bold text-slate-900">Form Submitted Successfully!</h1>
        <p class="text-slate-600">Your consent receipt has been securely recorded on the blockchain (simulated).</p>

        <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-4 text-left">
            <p class="text-xs text-indigo-500 font-semibold uppercase tracking-wider mb-1">Receipt ID</p>
            <p id="receipt-id" class="text-sm font-mono text-indigo-900 break-all select-all">Checking...</p>
        </div>

        <div class="pt-4">
            <a href="/demo-bank.html"
                class="inline-flex items-center justify-center w-full px-4 py-2 bg-slate-900 text-white rounded-lg font-medium hover:bg-slate-800 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
                Back to Demo
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const urlParams = new URLSearchParams(window.location.search);
        const receiptId = urlParams.get('consent_receipt_id');

        const receiptEl = document.getElementById('receipt-id');
        if (receiptId) {
            receiptEl.textContent = receiptId;
            receiptEl.classList.remove('text-red-600');
            receiptEl.classList.add('text-indigo-900');
        } else {
            receiptEl.innerHTML = '<span class="flex items-center gap-2"><i data-lucide="alert-circle" class="w-4 h-4"></i> Receipt Not Found</span>';
            receiptEl.classList.add('text-red-600');
            receiptEl.classList.remove('text-indigo-900');

            // Add helpful hint debug info
            const hint = document.createElement('p');
            hint.className = "text-xs text-red-500 mt-1";
            hint.textContent = "Did the SDK fail to load? Check console logs.";
            receiptEl.parentElement.appendChild(hint);
            lucide.createIcons();
        }
    </script>
</body>

</html>
